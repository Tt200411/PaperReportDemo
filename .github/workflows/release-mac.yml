name: Release Mac App

on:
  push:
    tags:
      - 'release-*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ai-study-assistant-mvp/package-lock.json

      - name: Install dependencies
        working-directory: ai-study-assistant-mvp
        run: npm ci

      - name: Build packaged app
        working-directory: ai-study-assistant-mvp
        run: npm run pack:mac

      - name: Archive app
        working-directory: ai-study-assistant-mvp
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/mac-arm64/AI Study Assistant MVP.app" \
            "dist/AI-Study-Assistant-MVP-mac-arm64-${GITHUB_REF_NAME}.zip"
          shasum -a 256 "dist/AI-Study-Assistant-MVP-mac-arm64-${GITHUB_REF_NAME}.zip" \
            > "dist/AI-Study-Assistant-MVP-mac-arm64-${GITHUB_REF_NAME}.sha256"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ai-study-assistant-mvp/dist/AI-Study-Assistant-MVP-mac-arm64-${{ github.ref_name }}.zip
            ai-study-assistant-mvp/dist/AI-Study-Assistant-MVP-mac-arm64-${{ github.ref_name }}.sha256
