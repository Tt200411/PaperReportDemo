name: Release Mac App

on:
  push:
    tags:
      - 'release-*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ai-study-assistant-mvp/package-lock.json

      - name: Install dependencies
        working-directory: ai-study-assistant-mvp
        run: npm ci

      - name: Build packaged app
        working-directory: ai-study-assistant-mvp
        run: npm run pack:mac

      - name: Archive app
        working-directory: ai-study-assistant-mvp
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/mac-arm64/AI Study Assistant MVP.app" \
            "dist/AI-Study-Assistant-MVP-mac-arm64-${GITHUB_REF_NAME}.zip"
          shasum -a 256 "dist/AI-Study-Assistant-MVP-mac-arm64-${GITHUB_REF_NAME}.zip" \
            > "dist/AI-Study-Assistant-MVP-mac-arm64-${GITHUB_REF_NAME}.sha256"

      - name: Prepare release metadata
        id: release_meta
        working-directory: ai-study-assistant-mvp
        run: |
          APP_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")
          BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          RELEASE_NAME="AI Study Assistant MVP v${APP_VERSION} | macOS arm64 | ${BUILD_TIME}"
          {
            echo "app_version=${APP_VERSION}"
            echo "build_time=${BUILD_TIME}"
            echo "release_name<<EOF"
            echo "${RELEASE_NAME}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          cat > ../release-notes.md <<EOF
          ## Release Info
          - Version: v${APP_VERSION}
          - Release tag: ${GITHUB_REF_NAME}
          - Supported device: Mac
          - Supported architecture: macOS arm64 (Apple Silicon)
          - Build time (UTC): ${BUILD_TIME}
          - Source commit: ${GITHUB_SHA}

          ## Included fixes
          - Bundled skills now resolve from packaged app resources instead of hardcoded local absolute paths.
          - Removed stray bundled artifacts such as \`.DS_Store\` and \`Untitled\`.
          - Essay skill draft output path now writes relative to the current workspace.
          - Upload buttons in the document area now use higher-contrast styling on light backgrounds.

          ## Assets
          - \`AI-Study-Assistant-MVP-mac-arm64-${GITHUB_REF_NAME}.zip\`
          - \`AI-Study-Assistant-MVP-mac-arm64-${GITHUB_REF_NAME}.sha256\`
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_meta.outputs.release_name }}
          body_path: release-notes.md
          files: |
            ai-study-assistant-mvp/dist/AI-Study-Assistant-MVP-mac-arm64-${{ github.ref_name }}.zip
            ai-study-assistant-mvp/dist/AI-Study-Assistant-MVP-mac-arm64-${{ github.ref_name }}.sha256
